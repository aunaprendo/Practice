<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Switcher</title>
  <link rel="stylesheet" href="./styles.css">
	<link rel="stylesheet" href="../cccss/themeSwitch.css" />
</head>
<body>
	
	<button aria-controls="theme-dropdown" aria-haspopup="true" aria-expanded="false" id="theme-switcher-button">Switch Theme</button>

		<li id="theme-dinosaurs" role="menuitem">Dinosaurs</li>
	</ul>
	<div aria-live="polite">Theme Switched</div>
	
	
  <script src="./script.js"></script>
	<script src="../ccjs/070themeSwitch.js"></script>
</body>
</html>
